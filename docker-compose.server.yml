# Production stack for Linux x86_64 (Tencent Cloud VM).
# Usage: docker compose -f docker-compose.server.yml up -d --build

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: agent
      POSTGRES_PASSWORD: agent
      POSTGRES_DB: agentflow
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/migrations/001_documents.sql:/docker-entrypoint-initdb.d/001_documents.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent -d agentflow"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  searxng:
    image: searxng/searxng:latest
    volumes:
      - ./config/searxng:/etc/searxng:rw
    environment:
      SEARXNG_BASE_URL: http://searxng:8080/
    restart: unless-stopped

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://agent:agent@db:5432/agentflow
      CHECKPOINTER: postgres
      SKILLS_ROOT: /skills
      SEARXNG_BASE_URL: http://searxng:8080
    volumes:
      - ./skills:/skills:ro
    depends_on:
      db:
        condition: service_healthy
      searxng:
        condition: service_started
    restart: unless-stopped

  fe:
    build:
      context: ./fe
      dockerfile: Dockerfile.prod
      args:
        NUXT_PUBLIC_API_BASE: ${NUXT_PUBLIC_API_BASE:-http://localhost:8000}
        NUXT_PUBLIC_DEFAULT_FLOW_ID: ${NUXT_PUBLIC_DEFAULT_FLOW_ID:-default}
    ports:
      - "3000:3000"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  pgdata:
