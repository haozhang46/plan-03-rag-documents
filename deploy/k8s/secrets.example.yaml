# Copy to secrets.yaml, fill in real values, apply once. Do NOT commit secrets.yaml.
# kubectl create secret generic agent-flow-backend --from-env-file=.env.prod -n agent-flow
apiVersion: v1
kind: Secret
metadata:
  name: agent-flow-backend
  namespace: agent-flow
type: Opaque
stringData:
  DATABASE_URL: "postgresql://agent:CHANGE_ME@postgres:5432/agentflow"
  PGUSER: "agent"
  PGPASSWORD: "CHANGE_ME"
  OPENAI_API_KEY: "sk-REPLACE"
  ANTHROPIC_API_KEY: ""
  JWT_SECRET: "REPLACE_WITH_RANDOM_32_BYTES"
  ADMIN_API_KEY: "REPLACE_ADMIN_KEY"
  LANGFUSE_PUBLIC_KEY: ""
  LANGFUSE_SECRET_KEY: ""
