# Sync replicaCount and resources with deploy/helm/values.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-flow-backend
  namespace: agent-flow
  labels:
    app.kubernetes.io/name: agent-flow-backend
    app.kubernetes.io/part-of: agent-flow
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: agent-flow-backend
  template:
    metadata:
      labels:
        app.kubernetes.io/name: agent-flow-backend
    spec:
      containers:
        - name: api
          image: agent-flow/backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - secretRef:
                name: agent-flow-backend
          env:
            - name: CHECKPOINTER
              value: "postgres"
            - name: TENANT_MODE
              value: "false"
            - name: RATE_LIMIT_RPM
              value: "60"
            - name: SUPERVISOR_MODE
              value: "off"
            - name: DISPATCH_MODE
              value: "sequential"
            - name: CLIENT_EMBEDDING_MODE
              value: "true"
            - name: EXPECTED_EMBEDDING_DIMENSIONS
              value: "768"
            - name: LANGFUSE_ENABLED
              value: "false"
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
